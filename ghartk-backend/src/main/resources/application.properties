# Server
server.port=8080
server.servlet.context-path=/api


# Database - Update password if different
spring.datasource.url=jdbc:mysql://localhost:3306/ghartk_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=GhartkSuperSecretKeyForJWTTokenGenerationAndValidation2024IndiaLocalDeliveryPlatform
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.ghartk=INFO
logging.level.org.springframework.security=WARN

# Initialize data
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
